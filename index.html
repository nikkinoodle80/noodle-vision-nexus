<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- VIEWPORT - Optimized for all devices: Desktop, Mobile, VR, AR -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Noodle-Vision" />
    
    <!-- PWA MANIFEST -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ICONS -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- THEME COLOR -->
    <meta name="theme-color" content="#0f0f1e" />
    <meta name="msapplication-TileColor" content="#0f0f1e" />
    
    <!-- SEO -->
    <meta name="description" content="First-class accessibility platform for VR/AR with modular synthesizer cable logic" />
    <meta name="keywords" content="VR, AR, accessibility, Noodle-Vision, cable logic, modular synthesizer" />
    <meta name="author" content="Noodle (Noodle-Vision)" />
    
    <!-- WEBXR -->
    <meta name="xr-compatible" content="true" />
    
    <title>Noodle-Vision Control Center</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 
                     'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 
                     'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #0f0f1e;
        color: #ffffff;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Global scrollbar styling */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: rgba(26, 26, 46, 0.3);
      }
      
      ::-webkit-scrollbar-thumb {
        background: rgba(78, 205, 196, 0.4);
        border-radius: 5px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(78, 205, 196, 0.6);
      }
      
      /* Loading screen */
      .initial-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 6px solid rgba(78, 205, 196, 0.2);
        border-top-color: #4ecdc4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 2rem;
        font-size: 1.25rem;
        color: #4ecdc4;
        font-weight: 600;
      }
    </style>
    
    <!-- SERVICE WORKER REGISTRATION -->
    <script>
      // Register service worker for PWA functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registered:', registration);
            })
            .catch((error) => {
              console.error('❌ Service Worker registration failed:', error);
            });
        });
      }
      
      // WebXR polyfill detection
      if (!('xr' in navigator)) {
        console.warn('⚠️ WebXR not supported - loading polyfill...');
        // You can load webxr-polyfill here if needed
      } else {
        console.log('✅ WebXR supported!');
      }
      
      // Gesture API detection
      if ('GestureEvent' in window) {
        console.log('✅ Gesture API supported');
      }
      
      // Spatial tracking detection
      if ('XRSession' in window) {
        console.log('✅ XR Session API available');
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading Noodle-Vision...</p>
      </div>
    </div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>

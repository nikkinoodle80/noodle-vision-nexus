<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Noodle-Vision</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      
      .offline-container {
        text-align: center;
        max-width: 500px;
      }
      
      .offline-icon {
        font-size: 6rem;
        margin-bottom: 2rem;
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.95); }
      }
      
      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      p {
        color: #a0aec0;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      
      .retry-btn {
        padding: 1rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #4ecdc4 0%, #44a8a0 100%);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s;
      }
      
      .retry-btn:hover {
        transform: scale(1.05);
      }
      
      .features {
        margin-top: 3rem;
        padding: 2rem;
        background: rgba(26, 26, 46, 0.6);
        border-radius: 12px;
        border: 2px solid rgba(78, 205, 196, 0.3);
      }
      
      .features h2 {
        font-size: 1.25rem;
        margin-bottom: 1rem;
        color: #4ecdc4;
      }
      
      .features ul {
        list-style: none;
        text-align: left;
      }
      
      .features li {
        padding: 0.5rem 0;
        color: #a0aec0;
      }
      
      .features li::before {
        content: '✓ ';
        color: #4ecdc4;
        font-weight: bold;
        margin-right: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1>You're Offline</h1>
      <p>
        No internet connection detected. Some features may be limited, but
        you can still access cached content.
      </p>
      <button class="retry-btn" onclick="location.reload()">
        🔄 Retry Connection
      </button>
      
      <div class="features">
        <h2>Available Offline:</h2>
        <ul>
          <li>View cached system metrics</li>
          <li>Access local console logs</li>
          <li>Navigate between pages</li>
          <li>View saved documentation</li>
        </ul>
      </div>
    </div>
    
    <script>
      // Auto-reload when back online
      window.addEventListener('online', () => {
        console.log('✅ Back online!');
        setTimeout(() => {
          location.reload();
        }, 1000);
      });
      
      // Visual indicator when connection restored
      window.addEventListener('online', () => {
        document.body.style.border = '5px solid #48bb78';
        setTimeout(() => {
          document.body.style.border = 'none';
        }, 2000);
      });
    </script>
  </body>
</html>
